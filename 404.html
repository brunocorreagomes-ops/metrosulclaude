<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Signal Not Found | Metro Sul</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      gap: 2rem;
      padding: 2rem;
      background: var(--black);
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--steel);
      opacity: 0.5;
    }
    .error-headline {
      font-family: var(--font-display);
      font-size: var(--t-3xl);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 0.95;
    }
    .error-headline .blue { color: var(--blue); }
    .error-sub {
      color: var(--steel);
      font-size: var(--t-sm);
      max-width: 400px;
      line-height: 1.7;
    }
    .error-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(0,157,255,0.2);
      border-top-color: var(--blue);
      border-right-color: var(--orange);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="error-ring" aria-hidden="true"></div>
  <div class="error-code">Error 404 / Signal Lost</div>
  <h1 class="error-headline">
    Signal<br />
    <span class="blue">Not</span> Found.
  </h1>
  <p class="error-sub">
    This frequency doesn't exist. The cycle continues at the starting point.
  </p>
  <a href="./" class="btn-primary" style="display:inline-flex;align-items:center;gap:0.5rem">
    ↩ Return to Cycle
  </a>
</body>
</html>
