<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#07111F"/>
      <stop offset="100%" stop-color="#03050A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#bgGrad)"/>
  <!-- Blue arc left -->
  <path d="M 10 32 A 22 22 0 0 1 32 10" stroke="#009DFF" stroke-width="3" fill="none" filter="url(#glow)" stroke-linecap="round"/>
  <path d="M 10 32 A 22 22 0 0 0 32 54" stroke="#37D8FF" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Orange arc right -->
  <path d="M 54 32 A 22 22 0 0 1 32 54" stroke="#FF6A00" stroke-width="3" fill="none" filter="url(#glow)" stroke-linecap="round"/>
  <path d="M 54 32 A 22 22 0 0 0 32 10" stroke="#FFB000" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#F4F8FF" filter="url(#glow)"/>
  <!-- Spark blue -->
  <circle cx="10" cy="32" r="2.5" fill="#37D8FF" filter="url(#glow)"/>
  <!-- Spark orange -->
  <circle cx="54" cy="32" r="2.5" fill="#FF6A00" filter="url(#glow)"/>
</svg>
